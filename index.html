<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>戦国統治シミュレーション - 諸大名統計・攻城戦拡張版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="top-bar">
    <div class="file-input-group">
        <span>① マップデータ</span>
        <input type="file" id="mapLoader" accept=".json">
    </div>
    <div class="file-input-group">
        <span>② シナリオデータ</span>
        <input type="file" id="scenarioLoader" accept=".json" disabled>
    </div>

    <div class="status-item">📅 日付: <span id="ui-season">🌸春</span> <span id="ui-date" class="status-value">----年 --月 --日</span></div>
    <div class="status-item">💰 資金: <span id="ui-gold" class="status-value">0</span></div>
    <div style="flex: 1;"></div>
    
    <div class="slider-container" style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center; margin-right: 15px;">
        <span style="font-size: 11px;">進行スピード:</span>
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="range" id="speedSlider" min="20" max="300" value="100" style="width: 80px; direction: rtl;" title="左へ動かすほど速く進みます" oninput="updateSpeedDisplay()">
            <span id="speedDisplay" style="font-size: 12px; font-weight:bold; color: #f1c40f; width: 45px;">0.10秒</span>
        </div>
    </div>

    <button id="btnToggleTime" class="action-btn" style="width: 160px; font-weight: bold;" onclick="gameEngine.toggleTime()" disabled title="ショートカット: Spaceキー">▶ 時間を進める</button>
</div>

<div id="main-container">
    <div id="map-container">
        <div id="map"></div>
        <div id="overlay-start">
            <h2>戦国統治シミュレーション - 攻城戦・経済拡張版</h2>
            <p>1. マップデータ、2. シナリオデータの順に読み込んでください。</p>
        </div>
        
        <div id="stats-modal" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:3000; justify-content:center; align-items:center;">
            <div style="background:#ecf0f1; width:85%; height:85%; border-radius:8px; padding:20px; display:flex; flex-direction:column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #2c3e50; padding-bottom:10px;">
                    <h2 style="margin:0; border:none; padding:0; color:#2c3e50;">📊 諸大名帳（勢力統計）</h2>
                    <button class="action-btn" onclick="toggleStatsModal()" style="background-color:#e74c3c; font-size:14px; padding:8px 15px;">✖ 閉じる</button>
                </div>
                <div id="stats-table-container" style="flex:1; overflow-y:auto; margin-top:15px;">
                    </div>
            </div>
        </div>
    </div>
    
    <div id="right-panel">
        <h2 id="panel-title" style="display:flex; justify-content:space-between; align-items:center;">
            🏯 情報パネル
            <button class="action-btn" style="padding: 4px 8px; font-size: 11px; background-color:#8e44ad;" onclick="toggleStatsModal()">📊 勢力統計</button>
        </h2>
        <div id="info-content"></div>
        <h2 style="margin-top: 20px;">🌍 勢力ランキング＆外交</h2>
        <div id="ranking-content" class="panel-section" style="background-color: #fdfdfd; padding: 8px;">
            <p style="font-size: 11px; color: #7f8c8d; margin:0;">シナリオ読み込み後に表示されます</p>
        </div>
    </div>
</div>

<div id="log-console">
    <div class="log-entry"><span class="log-month">[システム]</span> マップデータを読み込んでください。</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="constants.js"></script>
<script src="engine.js"></script>
<script src="main.js"></script>

</body>
</html>
